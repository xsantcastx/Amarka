<header class="site-nav" [class.site-nav--scrolled]="scrolled()">
  <div class="site-nav__inner">
    <a routerLink="/" class="site-nav__brand" aria-label="Amarka home">
      <img [src]="logoSrc" [alt]="logoAlt" class="site-nav__logo" />
      <div class="site-nav__copy">
        <span class="site-nav__name">{{ brandName }}</span>
        <span class="site-nav__tag">Bespoke Laser Engraving Studio · NYC Metro</span>
      </div>
    </a>

    <nav class="site-nav__links" aria-label="Primary">
      @for (link of navLinks; track link.href) {
      <a [routerLink]="link.href" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: !!link.exact }">
        {{ link.label }}
      </a>
      }
      <a routerLink="/enquire" class="btn-primary site-nav__cta">Enquire</a>
    </nav>

    <button class="site-nav__menu" type="button" (click)="toggleMobile()" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (mobileOpen) {
  <div class="site-nav__mobile">
    @for (link of navLinks; track link.href) {
    <a [routerLink]="link.href" (click)="closeMobile()">{{ link.label }}</a>
    }
    <a routerLink="/enquire" class="btn-primary" (click)="closeMobile()">Enquire</a>
  </div>
  }
</header>
