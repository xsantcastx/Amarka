<header class="site-nav" [class.site-nav--scrolled]="scrolled()" amarkaSmartStickyNav>
  <div class="site-nav__inner">
    <!-- Brand -->
    <a routerLink="/" class="site-nav__brand navbar-logo" aria-label="Amarka home" (click)="closeMobile()">
      <img [src]="logoSrc" [alt]="logoAlt" class="site-nav__logo" />
      <div class="site-nav__copy">
        <span class="site-nav__name">{{ brandName }}</span>
        <span class="site-nav__tag">Precision Laser Engraving</span>
      </div>
    </a>

    <!-- Desktop links -->
    <nav class="site-nav__links" aria-label="Primary navigation">
      @for (link of navLinks; track link.href) {
      <a [routerLink]="link.href"
         routerLinkActive="is-active"
         [routerLinkActiveOptions]="{ exact: !!link.exact }">
        {{ link.label }}
      </a>
      }
      <a routerLink="/enquire" class="site-nav__cta navbar-cta">
        <span class="site-nav__cta-text">Get a Quote</span>
        <svg class="site-nav__cta-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </nav>

    <!-- Mobile toggle -->
    <button class="site-nav__menu"
            type="button"
            (click)="toggleMobile()"
            [attr.aria-expanded]="mobileOpen"
            aria-label="Toggle navigation">
      <span [class.open]="mobileOpen"></span>
      <span [class.open]="mobileOpen"></span>
      <span [class.open]="mobileOpen"></span>
    </button>
  </div>

  <!-- AMK-65: Mobile trade-optimized nav drawer (full-screen overlay) -->
  <app-mobile-nav-drawer (drawerClose)="onDrawerClosed()"></app-mobile-nav-drawer>
</header>
